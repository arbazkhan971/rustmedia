# Configuration for `cargo deny check` — supply-chain and license hygiene.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# RustMedia is dual MIT/Apache-2.0; only permissive licenses are allowed in the
# dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The core and io crates must stay lean; this is enforced socially plus by the
# minimal dependency set. No specific bans are needed yet.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
