name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  name: rustmedia-linux-x86_64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, name: rustmedia-linux-aarch64, cross: true }
          - { os: macos-latest,   target: x86_64-apple-darwin,       name: rustmedia-macos-x86_64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,      name: rustmedia-macos-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    name: rustmedia-windows-x86_64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p rustmedia-cli
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          bin=target/${{ matrix.target }}/release/rustmedia
          tar -czf ${{ matrix.name }}.tar.gz -C "$(dirname "$bin")" rustmedia
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/rustmedia.exe -DestinationPath ${{ matrix.name }}.zip
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publish in dependency order. Requires the CARGO_REGISTRY_TOKEN secret.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in rustmedia-core rustmedia-io rustmedia-formats rustmedia rustmedia-cli; do
            cargo publish -p "$crate" || echo "skip $crate (already published?)"
            sleep 15
          done
